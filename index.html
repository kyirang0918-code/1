<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily F&B Trend Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="food-icons">
                <img src="pixel-food.png" alt="F&B 픽셀 일러스트" class="pixel-food-img">
            </div>
            <div class="logo sub-copy"> 최근 화제인 따끈 트렌드만 모았어요</div>
            
            <h1 class="main-title">오늘의 트렌드</h1>
            <p id="summary-text">AI가 분석한 오늘의 핵심 식음료 트렌드를 불러오는 중입니다...</p>
            <div class="meta-info">
                <span class="badge">Last Updated: <span id="update-date">...</span></span>
            </div>
        </header>

        <main id="trends-grid" class="trends-grid">
            </main>
    </div>

    <script>
        // 1. 캐시를 무시하고 최신 data.js를 먼저 불러옵니다.
        var dataScript = document.createElement('script');
        dataScript.src = 'data.js?v=' + new Date().getTime();
        
        // 2. data.js가 '완전히' 로드된 후에만 app.js를 실행하도록 순서를 꽉 잡아줍니다.
        dataScript.onload = function() {
            var appScript = document.createElement('script');
            appScript.src = 'app.js?v=' + new Date().getTime();
            document.body.appendChild(appScript);
        };
        
        document.body.appendChild(dataScript);
    </script>
    
    <div class="food-icons">
        <img src="pixel-food2.png" alt="F&B 픽셀 일러스트" class="pixel-food-img2">
    </div>
</body>
</html>
